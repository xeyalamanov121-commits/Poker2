<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Poker Oyunu</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1a1a2e;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 30px;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            background: #333;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #ffd700;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background: #ffed4e;
        }

        button.fold {
            background: #d32f2f;
            color: white;
        }

        button.fold:hover {
            background: #ff6b6b;
        }

        .game-info {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }

        .game-info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .cards-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .card {
            background: #fff;
            color: #000;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .players-list {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }

        .player-item {
            background: #333;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .current-turn {
            background: #ffd700;
            color: #000;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .actions button {
            margin: 0;
        }

        .bet-input {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .bet-input input {
            flex: 1;
            margin: 0;
        }

        .bet-input button {
            flex: 1;
            margin: 0;
        }

        .error {
            background: #d32f2f;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }

        .success {
            background: #4caf50;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Giriş Ekranı -->
        <div id="loginScreen" class="screen active">
            <h1>♠️ POKER ♠️</h1>
            <input type="text" id="playerName" placeholder="Oyunçu Adınız" maxlength="20">
            <button onclick="setPlayerName()">Başla</button>
        </div>

        <!-- Lobı Ekranı -->
        <div id="lobbyScreen" class="screen">
            <h1>♠️ POKER LBY ♠️</h1>
            <div id="playerInfo" class="game-info"></div>
            
            <button onclick="createGame()" style="background: #4caf50;">Yeni Oyun Yarat</button>
            
            <input type="text" id="gameCode" placeholder="Oyun Kodunu Daxil Edin">
            <button onclick="joinGame()">Oyuna Qoşul</button>
            
            <button onclick="logout()" class="fold">Çıxış</button>
        </div>

        <!-- Oyun Ekranı -->
        <div id="gameScreen" class="screen">
            <h1>♠️ OYUN ♠️</h1>
            
            <div id="gameCode" class="game-info" style="text-align: center; font-weight: bold;"></div>
            
            <div class="game-info">
                <p><strong>POT:</strong> <span id="potDisplay">0</span></p>
                <p><strong>SİZİN ÇIPLƏRINIZ:</strong> <span id="chipDisplay">1000</span></p>
            </div>

            <p style="text-align: center; font-weight: bold;">📍 KOMMUNİTİ KARTLARI</p>
            <div id="communityCards" class="cards-display">
                <span class="card" style="background: #ccc; color: #999;">?</span>
                <span class="card" style="background: #ccc; color: #999;">?</span>
                <span class="card" style="background: #ccc; color: #999;">?</span>
                <span class="card" style="background: #ccc; color: #999;">?</span>
                <span class="card" style="background: #ccc; color: #999;">?</span>
            </div>

            <p style="text-align: center; font-weight: bold;">🎴 SİZİN KARTLARINIZ</p>
            <div id="playerCards" class="cards-display">
                <span class="card" style="background: #ccc; color: #999;">?</span>
                <span class="card" style="background: #ccc; color: #999;">?</span>
            </div>

            <div id="playersList" class="players-list"></div>

            <div id="messageBox"></div>

            <div class="actions">
                <button onclick="playerFold()" class="fold">FOLD</button>
                <button onclick="playerCheck()">CHECK</button>
            </div>

            <div class="bet-input">
                <input type="number" id="betAmount" placeholder="Bahis Miqdarı" min="1">
                <button onclick="playerBet()">BET</button>
            </div>

            <div class="actions">
                <button onclick="playerCall()">CALL</button>
                <button onclick="playerRaise()">RAISE</button>
            </div>

            <button onclick="leaveGame()" class="fold">Oyundan Çıx</button>
        </div>
    </div>
