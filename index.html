<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Poker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            background: #1a3a52;
            border-radius: 15px;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .title {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            color: #fff;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e74c3c;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            background: #e74c3c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 5px 10px 0;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #c0392b;
        }
        
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .games-list {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .game-item {
            background: #16213e;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            border-left: 4px solid #e74c3c;
        }
        
        .game-item:hover {
            background: #1a3a52;
        }
        
        .table {
            background: #0f7d3f;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .cards-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .card {
            background: white;
            border: 2px solid #333;
            border-radius: 5px;
            width: 60px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #e74c3c;
        }
        
        .pot-info {
            text-align: center;
            color: #fff;
            font-size: 20px;
            margin: 15px 0;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
        }
        
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .player-box {
            background: #16213e;
            padding: 15px;
            border-radius: 5px;
            color: #fff;
            text-align: center;
            border: 3px solid transparent;
        }
        
        .player-box.active {
            border-color: #f1c40f;
            background: #1a4d2e;
        }
        
        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .player-chips {
            color: #f1c40f;
            font-size: 14px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .status {
            color: #f1c40f;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🎰 Online Poker</div>
        
        <!-- SCREEN 1: Oyunçu Adı -->
        <div class="screen active" id="screen1">
            <h3 style="color: #fff; margin-bottom: 15px;">Oyunçu Adını Daxil Edin:</h3>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Adınız..." maxlength="20">
            </div>
            <button onclick="screen1_enter()">Lobiyaya Gir</button>
        </div>
        
        <!-- SCREEN 2: Oyun Seçimi -->
        <div class="screen" id="screen2">
            <h3 style="color: #fff; margin-bottom: 15px;">Oyun Seçin:</h3>
            <button onclick="screen2_createGame()">🆕 Yeni Oyun Yarat</button>
            
            <h3 style="color: #fff; margin-top: 20px; margin-bottom: 15px;">Mövcud Oyunlar:</h3>
            <div class="games-list" id="gamesList">
                <p style="color: #aaa; text-align: center;">Oyun axtarılır...</p>
            </div>
            
            <button onclick="screen2_logout()" style="margin-top: 20px; background: #95a5a6;">Çıxış</button>
        </div>
        
        <!-- SCREEN 3: Oyun -->
        <div class="screen" id="screen3">
            <div class="status" id="gameStatus">Oyun başlayır...</div>
            
            <div class="pot-info">💰 POT: <span id="potAmount">0</span></div>
            
            <div class="table">
                <div style="color: #fff; margin-bottom: 10px;">Cəmiyyət Kartları:</div>
                <div class="cards-row" id="communityCards"></div>
            </div>
            
            <div style="color: #fff; margin-bottom: 10px;">Sizin Kartlarınız:</div>
            <div class="cards-row" id="myCards"></div>
            
            <div class="players-grid" id="playersList"></div>
            
            <div class="action-buttons" id="actionButtons">
                <p style="color: #fff;">Lütfən gözləyin...</p>
            </div>
            
            <button onclick="screen3_leave()" style="margin-top: 20px; background: #95a5a6; width: 100%;">Oyundan Çıx</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtUtWhDve08YNNpAgH4JnZQYXGWnhYt-c",
            authDomain: "poker-c116f.firebaseapp.com",
            projectId: "poker-c116f",
            storageBucket: "poker-c116f.firebasestorage.app",
            messagingSenderId: "380423462698",
            appId: "1:380423462698:web:5a2d868df9b0ed10f4c853"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {
            name: null,
            id: null,
            gameId: null
        };

        function showScreen(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + n).classList.add('active');
        }

        // SCREEN 1: Adı daxil et
        function screen1_enter() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert('Adınızı daxil edin!');
                return;
            }
            myData.name = name;
            myData.id = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            showScreen(2);
            loadGames();
        }

        function loadGames() {
            db.ref('games').on('value', (snapshot) => {
                const list = document.getElementById('gamesList');
                const games = snapshot.val();
                
                if (!games || Object.keys(games).length === 0) {
                    list.innerHTML = '<p style="color: #aaa; text-align: center;">Hazırda oyun yoxdur</p>';
                    return;
                }

                list.innerHTML = '';
                Object.keys(games).forEach(gameId => {
                    const game = games[gameId];
                    if (game.gameStatus === 'waiting' && game.playerCount < 6) {
                        const item = document.createElement('div');
                        item.className = 'game-item';
                        item.textContent = `Oyun ${gameId.substring(0, 6)} - ${game.playerCount}/6 oyunçu`;
                        item.onclick = () => joinGame(gameId);
                        list.appendChild(item);
                    }
                });
            });
        }

        function screen2_createGame() {
            const gameId = 'game_' + Date.now();
            const gameData = {
                gameStatus: 'waiting',
                playerCount: 1,
                potAmount: 0,
                activePlayerIndex: 0,
                round: 'pre-flop',
                players: {
                    [myData.id]: { name: myData.name, chips: 1000 }
                }
            };
            
            db.ref('games/' + gameId).set(gameData).then(() => {
                joinGame(gameId);
            });
        }

        function joinGame(gameId) {
            myData.gameId = gameId;
            
            db.ref('games/' + gameId + '/players/' + myData.id).set({
                name: myData.name,
                chips: 1000
            });

            db.ref('games/' + gameId + '/playerCount').set(db.ref('games/' + gameId + '/players').orderByChild('.').limitToLast(1), (snapshot) => {
                const count = snapshot.numChildren() || 1;
                db.ref('games/' + gameId + '/playerCount').set(count);
            });

            showScreen(3);
            watchGame(gameId);
        }

        function watchGame(gameId) {
            db.ref('games/' + gameId).on('value', (snapshot) => {
                const game = snapshot.val();
                if (!game) return;

                updateGameUI(game);
            });
        }

        function updateGameUI(game) {
            document.getElementById('potAmount').textContent = game.potAmount || 0;
            document.getElementById('gameStatus').textContent = 'Raund: ' + (game.round || 'pre-flop');

            // Kartları göstər
            const myCards = game.myCards || [];
            const commCards = game.communityCards || [];

            document.getElementById('myCards').innerHTML = myCards.length > 0 
                ? myCards.map(c => `<div class="card">${c}</div>`).join('')
                : '<p style="color: #fff;">Kartları gözləyin...</p>';

            document.getElementById('communityCards').innerHTML = commCards.length > 0
                ? commCards.map(c => `<div class="card">${c}</div>`).join('')
                : '<p style="color: #fff;">Dəstə boşdur</p>';

            // Oyunçuları göstər
            const players = game.players || {};
            const playersList = document.getElementById('playersList');
            playersList.innerHTML = '';

            Object.keys(players).forEach((pId, idx) => {
                const p = players[pId];
                const isActive = idx === game.activePlayerIndex;
                const box = document.createElement('div');
                box.className = 'player-box' + (isActive ? ' active' : '');
                box.innerHTML = `
                    <div class="player-name">${p.name}</div>
                    <div class="player-chips">💰 ${p.chips}</div>
                `;
                playersList.appendChild(box);
            });

            // Düymələri göstər
            updateButtons(game);
        }

        function updateButtons(game) {
            const buttons = document.getElementById('actionButtons');
            const players = Object.keys(game.players || {});
            const isMyTurn = players[game.activePlayerIndex] === myData.id;

            if (!isMyTurn) {
                buttons.innerHTML = '<p style="color: #fff;">Digər oyunçunun növbəsi...</p>';
                return;
            }

            buttons.innerHTML = `
                <button onclick="playerAction('fold')">FOLD</button>
                <button onclick="playerAction('check')">CHECK</button>
                <button onclick="playerAction('call')">CALL</button>
                <button onclick="playerAction('raise')">RAISE</button>
            `;
        }

        function playerAction(action) {
            if (!myData.gameId) return;
            
            const timestamp = Date.now();
            db.ref('games/' + myData.gameId + '/lastAction').set({
                playerId: myData.id,
                action: action,
                timestamp: timestamp
            });

            // Sonrakı oyunçuya keç
            db.ref('games/' + myData.gameId + '/activePlayerIndex').transaction((current) => {
                const players = Object.keys(db.ref('games/' + myData.gameId + '/players').get().val() || {});
                return (current + 1) % players.length;
            });
        }

        function screen3_leave() {
            if (myData.gameId) {
                db.ref('games/' + myData.gameId + '/players/' + myData.id).remove();
                myData.gameId = null;
            }
            showScreen(2);
            loadGames();
        }

        function screen2_logout() {
            myData = { name: null, id: null, gameId: null };
            document.getElementById('playerName').value = '';
            showScreen(1);
        }
    </script>
</body>
</html>
