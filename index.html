<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Poker Oyunu</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            background: #0f1419;
            border-radius: 15px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            color: white;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        input, button, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        input {
            background: #1e2128;
            color: white;
            border: 1px solid #ffcc00;
        }
        
        button {
            background: #ffcc00;
            color: #0f1419;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background: #ffdd33;
            transform: scale(1.02);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .game-table {
            background: #0a4d0a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 3px solid #ffcc00;
        }
        
        .pot {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 15px;
        }
        
        .community-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .card {
            background: white;
            color: #0f1419;
            width: 50px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
        }
        
        .card.hidden {
            background: #0f1419;
            border: 2px solid #ffcc00;
        }
        
        .player-info {
            background: #1e2128;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ffcc00;
        }
        
        .player-info.current {
            background: #2a3d2a;
            border-left: 4px solid #00ff00;
        }
        
        .player-list {
            margin-bottom: 15px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .action-buttons button {
            flex: 1;
            padding: 10px;
        }
        
        .status {
            background: #1e2128;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            color: #ffcc00;
        }
        
        .error {
            background: #4a0000;
            color: #ff6666;
        }
        
        .success {
            background: #004a00;
            color: #66ff66;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 Online Poker</h1>
        
        <!-- Lobby Section -->
        <div id="lobbySection" class="section active">
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Oyunçu adı" maxlength="15">
            </div>
            
            <div class="input-group">
                <input type="text" id="gameId" placeholder="Oyun kodu (seçmə)">
            </div>
            
            <button onclick="createGame()">📋 Yeni Oyun Aç</button>
            <button onclick="joinGame()">🎮 Oyuna Qoşul</button>
            
            <div id="lobbyStatus" class="status" style="display: none;"></div>
            
            <div class="input-group" style="margin-top: 20px;">
                <h3 style="margin-bottom: 10px;">Açıq Oyunlar:</h3>
                <div id="gameList"></div>
            </div>
        </div>
        
        <!-- Game Section -->
        <div id="gameSection" class="section">
            <div class="status" id="gameStatus">Qeydlənirsiniz...</div>
            
            <div class="game-table">
                <div class="pot" id="potDisplay">Pot: 0</div>
                
                <div class="community-cards" id="communityCards">
                    <div class="card hidden">?</div>
                    <div class="card hidden">?</div>
                    <div class="card hidden">?</div>
                    <div class="card hidden">?</div>
                    <div class="card hidden">?</div>
                </div>
                
                <div class="player-list" id="playerList"></div>
            </div>
            
            <div id="yourHand" class="input-group">
                <h3>Sizin Kartları:</h3>
                <div class="community-cards" id="handCards"></div>
            </div>
            
            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button onclick="playerFold()">Əl Burax</button>
                <button onclick="playerCall()">Call</button>
                <button onclick="playerRaise()">Raise</button>
                <button onclick="playerCheck()">Check</button>
            </div>
            
            <button onclick="leaveGame()" style="margin-top: 10px; background: #cc0000;">❌ Oyundan Çık</button>
        </div>
    </div>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBtUtWhDve08YNNpAgH4JnZQYXGWnhYt-c",
            authDomain: "poker-c116f.firebaseapp.com",
            projectId: "poker-c116f",
            storageBucket: "poker-c116f.firebasestorage.app",
            messagingSenderId: "380423462698",
            appId: "1:380423462698:web:5a2d868df9b0ed10f4c853"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentPlayer = null;
        let currentGameId = null;
        let gameRef = null;
        
        // Oyun Yaratmaq
        function createGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                showStatus('Oyunçu adı daxil edin!', 'lobbyStatus', true);
                return;
            }
            
            const gameId = Math.random().toString(36).substring(7).toUpperCase();
            currentGameId = gameId;
            currentPlayer = {
                name: name,
                chips: 1000,
                hand: [],
                bet: 0,
                status: 'waiting'
            };
            
            db.ref('games/' + gameId).set({
                gameId: gameId,
                status: 'waiting',
                pot: 0,
                players: {
                    [name]: currentPlayer
                },
                createdAt: new Date().getTime()
            }).then(() => {
                showStatus('Oyun açıldı: ' + gameId, 'lobbyStatus', false);
                setTimeout(() => {
                    document.getElementById('lobbySection').classList.remove('active');
                    document.getElementById('gameSection').classList.add('active');
                    watchGame();
                }, 1500);
            });
        }
        
        // Oyuna Qoşulmaq
        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            const gameId = document.getElementById('gameId').value.trim().toUpperCase();
            
            if (!name || !gameId) {
                showStatus('Adı və oyun kodunu daxil edin!', 'lobbyStatus', true);
                return;
            }
            
            currentGameId = gameId;
            currentPlayer = {
                name: name,
                chips: 1000,
                hand: [],
                bet: 0,
                status: 'waiting'
            };
            
            db.ref('games/' + gameId + '/players/' + name).set(currentPlayer).then(() => {
                document.getElementById('lobbySection').classList.remove('active');
                document.getElementById('gameSection').classList.add('active');
                watchGame();
            }).catch(err => {
                showStatus('Oyun tapılmadı!', 'lobbyStatus', true);
            });
        }
        
        // Oyunu Gözləmək
        function watchGame() {
            gameRef = db.ref('games/' + currentGameId);
            
            gameRef.on('value', (snapshot) => {
                const game = snapshot.val();
                if (!game) return;
                
                updateGameDisplay(game);
            });
        }
        
        // Oyun Ekranını Yeniləmək
        function updateGameDisplay(game) {
            // Pot-u Göstər
            document.getElementById('potDisplay').textContent = 'Pot: ' + (game.pot || 0);
            
            // Oyunçuları Göstər
            let playerListHTML = '';
            Object.values(game.players || {}).forEach(p => {
                const isCurrent = p.name === currentPlayer.name;
                playerListHTML += `
                    <div class="player-info ${isCurrent ? 'current' : ''}">
                        <strong>${p.name}</strong> - Chips: ${p.chips} | Bet: ${p.bet}
                    </div>
                `;
            });
            document.getElementById('playerList').innerHTML = playerListHTML;
            
            // Statusu Göstər
            const status = game.status === 'playing' ? '🎮 Oyun Gedir' : '⏳ Gözləniliyor';
            document.getElementById('gameStatus').textContent = status;
            
            // Səhifəni Yenilə
            if (game.players[currentPlayer.name]?.hand) {
                updateHandDisplay(game.players[currentPlayer.name].hand);
            }
        }
        
        // Əl Göstərmə
        function updateHandDisplay(hand) {
            let handHTML = '';
            hand.forEach(card => {
                handHTML += `<div class="card">${card}</div>`;
            });
            document.getElementById('handCards').innerHTML = handHTML;
        }
        
        // Oyundan Çıkmaq
        function leaveGame() {
            if (!currentGameId || !currentPlayer) return;
            
            db.ref('games/' + currentGameId + '/players/' + currentPlayer.name).remove();
            currentGameId = null;
            currentPlayer = null;
            
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('lobbySection').classList.add('active');
        }
        
        // Əl Buraxmaq
        function playerFold() {
            updatePlayerStatus('folded');
            showStatus('Əli burdunuz', 'gameStatus');
        }
        
        // Call Etmək
        function playerCall() {
            updatePlayerStatus('called');
            showStatus('Call etdiniz', 'gameStatus');
        }
        
        // Raise Etmək
        function playerRaise() {
            updatePlayerStatus('raised');
            showStatus('Raise etdiniz', 'gameStatus');
        }
        
        // Check Etmək
        function playerCheck() {
            updatePlayerStatus('checked');
            showStatus('Check etdiniz', 'gameStatus');
        }
        
        function updatePlayerStatus(action) {
            if (!currentGameId || !currentPlayer) return;
            db.ref('games/' + currentGameId + '/players/' + currentPlayer.name).update({
                status: action
            });
        }
        
        // Status Göstərmə
        function showStatus(message, elementId, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
            el.className = 'status ' + (isError ? 'error' : 'success');
            
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }
        
        // Açıq Oyunları Yüklə
        window.addEventListener('load', () => {
            db.ref('games').on('value', (snapshot) => {
                let gameHTML = '';
                Object.values(snapshot.val() || {}).forEach(game => {
                    if (game.status === 'waiting') {
                        gameHTML += `
                            <div style="background: #1e2128; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 4px solid #ffcc00;">
                                <strong>Kod: ${game.gameId}</strong><br>
                                Oyunçular: ${Object.keys(game.players || {}).length}<br>
                                <button onclick="document.getElementById('gameId').value = '${game.gameId}';" style="margin-top: 5px;">Seç</button>
                            </div>
                        `;
                    }
                });
                if (gameHTML) {
                    document.getElementById('gameList').innerHTML = gameHTML;
                } else {
                    document.getElementById('gameList').innerHTML = '<p style="color: #666;">Açıq oyun yoxdur</p>';
                }
            });
        });
    </script>
</body>
</html>
